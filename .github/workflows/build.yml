name: Build SONAR APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Extract ZIP
        run: unzip "Claude zip.zip" -d extracted
      - name: Find and build
        run: |
          find extracted -name "gradlew"
          GRADLE_DIR=$(find extracted -name "gradlew" -type f | head -1 | xargs dirname)
          cd "$GRADLE_DIR"
          chmod +x gradlew
          ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: SONAR-APK
          path: "**/*.apk"
